name: Windows Remote Access

on:
  workflow_dispatch:

jobs:
  remote-access:
    runs-on: windows-latest
    timeout-minutes: 360

    steps:

      - name: Enable Remote Desktop
        shell: powershell
        run: |
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' `
                           -Name "fDenyTSConnections" -Value 0 -Force

          Enable-NetFirewallRule -DisplayGroup "Remote Desktop"

          Restart-Service TermService -Force

      - name: Create User
        shell: powershell
        run: |
          $password = ConvertTo-SecureString "Ahmad123" -AsPlainText -Force

          if (-not (Get-LocalUser -Name "RDP" -ErrorAction SilentlyContinue)) {
              New-LocalUser -Name "RDP" -Password $password -AccountNeverExpires
          }

          Add-LocalGroupMember -Group "Administrators" -Member "RDP"
          Add-LocalGroupMember -Group "Remote Desktop Users" -Member "RDP"

          echo "USERNAME=RDP" >> $env:GITHUB_ENV
          echo "PASSWORD=Ahmad123" >> $env:GITHUB_ENV

      - name: Install Tailscale
        shell: powershell
        run: |
          $url = "https://pkgs.tailscale.com/stable/tailscale-setup-latest-amd64.msi"
          $file = "$env:TEMP\tailscale.msi"

          Invoke-WebRequest $url -OutFile $file
          Start-Process msiexec.exe -ArgumentList "/i `"$file`" /quiet /norestart" -Wait

      - name: Connect Tailscale
        shell: powershell
        run: |
          & "$env:ProgramFiles\Tailscale\tailscale.exe" up --authkey=${{ secrets.TAILSCALE_AUTH_KEY }}

          Start-Sleep -Seconds 10

          $ip = & "$env:ProgramFiles\Tailscale\tailscale.exe" ip -4

          echo "TS_IP=$ip" >> $env:GITHUB_ENV

      - name: Show Connection Info
        shell: powershell
        run: |
          Write-Host ""
          Write-Host "====== RDP CONNECTION DETAILS ======"
          Write-Host "IP Address : $env:TS_IP"
          Write-Host "Username   : $env:USERNAME"
          Write-Host "Password   : $env:PASSWORD"
          Write-Host "===================================="
          Write-Host ""

      - name: Keep Runner Alive
        shell: powershell
        run: |
          Write-Host "Runner will stay active for 6 hours..."
          Start-Sleep -Seconds 21600
